name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Allow the workflow to write to the repo (needed to push to gh-pages branch)
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          BASE_PATH: /
        run: npm run build

      - name: Copy index.html to 404.html (fixes client-side routing on GitHub Pages)
        run: cp out/index.html out/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          cname: www.uatrips.com
